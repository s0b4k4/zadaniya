version: "2"
sql:
  - engine: "postgresql"
    queries: "sqlc/query.sql"
    schema: "migrations/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/repository/db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false

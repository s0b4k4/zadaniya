syntax = "proto3";

package car.v1;

option go_package = "github.com/username/tasks_implementation/api/car/v1;carv1";

import "google/api/annotations.proto";

service GarageService {
  rpc CreateCar(CreateCarRequest) returns (CarResponse) {
    option (google.api.http) = {
      post: "/v1/cars"
      body: "*"
    };
  }

  rpc GetCar(GetCarRequest) returns (CarResponse) {
    option (google.api.http) = {
      get: "/v1/cars/{vin}"
    };
  }
}

message Car {
  string vin = 1;
  string brand = 2;
  int32 year = 3;
}

message CreateCarRequest {
  string vin = 1;
  string brand = 2;
  int32 year = 3;
}

message GetCarRequest {
  string vin = 1;
}

message CarResponse {
  Car car = 1;
}

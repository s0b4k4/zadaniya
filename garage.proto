syntax = "proto3";
package garage;
option go_package = "github.com/course/tasks/pkg/garage_v1";

message Car {
    string vin = 1;
    string brand = 2;
    int32 year = 3;
}

message CreateCarRequest { Car car = 1; }
message CreateCarResponse { string message = 1; }
message GetCarRequest { string vin = 1; }

service GarageService {
    rpc CreateCar(CreateCarRequest) returns (CreateCarResponse);
    rpc GetCar(GetCarRequest) returns (Car);
}

syntax = "proto3";

package article.v1;
option go_package = "github.com/course/tasks/api/article/v1;articlev1";

import "google/api/annotations.proto";

service ContentService {
  rpc CreateArticle(CreateArticleRequest) returns (ArticleResponse) {
    option (google.api.http) = {
      post: "/v1/articles"
      body: "*"
    };
  }

  rpc GetArticle(GetArticleRequest) returns (ArticleResponse) {
    option (google.api.http) = {
      get: "/v1/articles/{id}"
    };
  }
}

service SearchService {
  rpc IndexArticle(IndexArticleRequest) returns (IndexArticleResponse);
}

message CreateArticleRequest {
  string title = 1;
  string content = 2;
  int32 author_id = 3;
}

message ArticleResponse {
  int32 id = 1;
  string title = 2;
  string content = 3;
  int32 author_id = 4;
}

message GetArticleRequest {
  int32 id = 1;
}

message IndexArticleRequest {
  int32 article_id = 1;
  string title = 2;
  string content = 3;
}

message IndexArticleResponse {
  bool success = 1;
}

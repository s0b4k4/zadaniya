syntax = "proto3";

package smarthome.v1;
option go_package = "github.com/course/tasks/api/smarthome/v1;smarthomev1";

import "google/api/annotations.proto";

service SmartHomeService {
  rpc SubmitReading(SubmitReadingRequest) returns (SubmitReadingResponse) {
    option (google.api.http) = {
      post: "/v1/readings"
      body: "*"
    };
  }

  rpc MonitorReadings(MonitorReadingsRequest) returns (stream Reading) {
    option (google.api.http) = {
      get: "/v1/readings/stream"
    };
  }
}

message SubmitReadingRequest {
  string device_id = 1;
  float value = 2;
  string timestamp = 3;
}

message SubmitReadingResponse {
  bool success = 1;
}

message MonitorReadingsRequest {
  string device_id = 1;
}

message Reading {
  string device_id = 1;
  float value = 2;
  string timestamp = 3;
}
